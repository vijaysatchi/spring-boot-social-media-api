<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Post')}"></head>
<body>
<div class="container">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="main-content">
        <div class="back-button">
            <button id="backBtn" class="back-btn"><i class="fas fa-arrow-left"></i> Back</button>
        </div>

        <div id="postContainer" class="post-container"></div>

        <div id="commentsSection" class="comments-section" style="display: none;">
            <div class="comments-header">
                <h3><i class="fas fa-comments"></i> Comments</h3>
                <span id="commentCount" class="comment-count">0 comments</span>
            </div>

            <div class="comment-input-container">
                <img src="/images/default-avatar.png" id="currentUserAvatar" class="comment-avatar" alt="Your avatar">
                <div class="comment-input-wrapper">
                    <textarea id="commentInput" placeholder="Add a comment..." maxlength="500" rows="1"></textarea>
                    <button id="postCommentBtn" class="post-comment-btn" disabled>Post</button>
                </div>
            </div>

            <div id="commentsFeed" class="comments-feed"></div>
            <div id="commentSentinel" class="scroll-sentinel"></div>
        </div>
    </main>
</div>

<script type="module" th:inline="javascript">
    window.__PAGE_DATA__ = {
        postId: /*[[${postId}]]*/ null
    };
    import('/js/main/post.js').then(m => m.start());
</script>
</body>
</html>
