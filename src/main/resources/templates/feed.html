<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Feed')}"></head>
<body>
<div class="container">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="main-feed">
        <div class="feed-header">
            <h1 th:text="${feedType == 'following' ? 'Following Feed' : 'Global Feed'}">Global Feed</h1>
        </div>
        <div id="postComposer" class="post-composer" style="display: none;">
            <div class="post-composer-header">
                <img src="/images/default-avatar.png" id="composerAvatar" class="profile-pic" alt="Your avatar">
                <textarea id="postCaption" placeholder="What's happening?" maxlength="255" rows="2"></textarea>
            </div>
            <div class="post-composer-actions">
                <div class="char-count"><span id="charCount">0</span>/255</div>
                <button id="submitPostBtn" class="post-btn" disabled>Post</button>
            </div>
        </div>
        <div id="feed" class="feed"></div>
        <div id="sentinel" class="scroll-sentinel"></div>
    </main>
</div>

<script type="module", th:inline="javascript">
    window.__PAGE_DATA__ = {
        feedType: /*[[${feedType}]]*/ 'global'
    };
    import('/js/main/feed.js').then(m => m.start());
</script>
</body>
</html>
